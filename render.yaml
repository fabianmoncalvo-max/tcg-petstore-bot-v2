services:
  - type: web
    name: tcg-petstore-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: BOT_TOKEN
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: tcg-petstore-db
          property: connectionString
      - key: ADMIN_CHAT_ID
        sync: false

databases:
  - name: tcg-petstore-db
    databaseName: tcg_petstore
    user: tcg_user
