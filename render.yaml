services:
  - type: web
    name: tcg-petstore-bot
    env: python
    runtime: python-3.11
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: WEB_CONCURRENCY
        value: "1"
      - key: BOT_TOKEN
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: tcg-petstore-db
          property: connectionString
      - key: ADMIN_CHAT_ID
        sync: false

databases:
  - name: tcg-petstore-db
    databaseName: tcg_petstore
    user: tcg_user
